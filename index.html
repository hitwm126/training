<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>培训视频学习</title>
    <style>
        body{margin:20px;font-family:Microsoft Yahei}
        .container{max-width:1000px;margin:0 auto}
        .video{width:100%;aspect-ratio:16/9;background:#000}
        .status{margin:10px 0;color:#666}
        button{padding:10px 20px;background:#0066ff;color:#fff;border:none;border-radius:6px;cursor:pointer}
    </style>
</head>
<body>
<div class="container">
    <h2>培训视频学习</h2>
    <div id="userInfo" class="status">正在验证飞书身份...</div>
    <iframe class="video" src="https://saic-gm.feishu.cn/file/AC1dbFxXio5iAIxJwS0c5dssn0b" frameborder="0" allowfullscreen></iframe>
    <br><br>
    <button id="submitBtn" style="display:none">已学习完毕，提交记录</button>
    <div id="msg" class="status"></div>
</div>

<script>
// 基础配置
const APP_ID = "cli_aa847d2bff64dbd3";
// 替换成你自己的飞书表单链接
const FORM_URL = "https://saic-gm.feishu.cn/share/base/form/shrcnmgO6ZVJsGWTBzlmb2oTVmh";
const REDIRECT_URI = window.location.origin + window.location.pathname;
const params = new URLSearchParams(location.search);
const code = params.get("code");

// 1. 无授权码：跳飞书登录
if (!code) {
    window.location.href = `https://open.feishu.cn/open-apis/authen/v1/index?redirect_uri=${encodeURIComponent(REDIRECT_URI)}&client_id=${APP_ID}&response_type=code`;
} else {
    // 2. 有授权码：直接认为身份验证成功（飞书已经帮你做了登录校验）
    document.getElementById("userInfo").innerText = "✅ 飞书身份验证成功";
    document.getElementById("submitBtn").style.display = "block";
}

// 点击按钮带参数跳转表单
document.getElementById("submitBtn").onclick = function(){
    const now = new Date().toLocaleString("zh-CN");
    // 用code作为用户唯一标识，表单里可以用它来区分不同用户
    const jumpUrl = `${FORM_URL}?授权码=${encodeURIComponent(code)}&完成时间=${encodeURIComponent(now)}&状态=已完成学习&视频ID=AC1dbFxXio5iAIxJwS0c5dssn0b`;
    window.open(jumpUrl,"_blank");
    document.getElementById("msg").innerText = "✅ 已跳转到提交表单，请完成提交";
}
</script>
</body>
</html>
