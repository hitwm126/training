<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>培训视频学习</title>
    <style>
        body{margin:20px;font-family:Microsoft Yahei}
        .container{max-width:1000px;margin:0 auto}
        .video{width:100%;aspect-ratio:16/9;background:#000}
        .status{margin:10px 0;color:#666}
        .progress{margin:10px 0;color:#0066ff;font-weight:bold}
        button{padding:10px 20px;background:#0066ff;color:#fff;border:none;border-radius:6px;cursor:pointer;margin:5px 0}
        button:disabled{background:#ccc;cursor:not-allowed}
    </style>
</head>
<body>
<div class="container">
    <h2>培训视频学习</h2>
    <div id="userInfo" class="status">正在验证飞书身份...</div>

    <!-- 注意：iframe保留原链接，不加无效参数 -->
    <iframe id="videoFrame" class="video" 
            src="https://saic-gm.feishu.cn/file/AC1dbFxXio5iAIxJwS0c5dssn0b" 
            frameborder="0" allow="autoplay" allowfullscreen></iframe>

    <div id="progressText" class="progress">学习进度：0% / 需学习10分钟解锁提交</div>
    <button id="submitBtn" style="display:none" disabled>已学习完毕，提交记录</button>
    <div id="msg" class="status"></div>
</div>

<script>
const APP_ID = "cli_aa847d2bff64dbd3";
const FORM_URL = "https://saic-gm.feishu.cn/share/base/form/shrcnmgO6ZVJsGWTBzlmb2oTVmh";
const REDIRECT_URI = window.location.origin + window.location.pathname;
const params = new URLSearchParams(location.search);
const code = params.get("code");

const NEED_SECONDS = 600;

let studySeconds = 0;
let timer = null;
let isUnlock = false;
const frame = document.getElementById("videoFrame");

// 加载本地保存的进度
function loadProgress() {
    let save = localStorage.getItem("study_progress");
    if (save) {
        let data = JSON.parse(save);
        if (Date.now() - data.time < 86400000) {
            studySeconds = data.seconds || 0;
        }
    }
}

// 更新进度显示
function updateProgress() {
    let percent = (studySeconds / NEED_SECONDS) * 100;
    percent = Math.min(percent, 100);
    
    document.getElementById("progressText").innerText = 
        `学习进度：${percent.toFixed(1)}% / 需学习10分钟解锁提交`;

    if (studySeconds >= NEED_SECONDS && !isUnlock) {
        isUnlock = true;
        clearInterval(timer);
        document.getElementById("submitBtn").disabled = false;
        document.getElementById("progressText").innerText = "✅ 学习完成，可提交记录！";
        document.getElementById("progressText").style.color = "#00b42a";
    }
}

// 自动开始计时
function startTimer() {
    loadProgress();
    updateProgress();
    
    timer = setInterval(() => {
        if (isUnlock) return;
        studySeconds++;
        updateProgress();
        localStorage.setItem("study_progress", JSON.stringify({
            seconds: studySeconds,
            time: Date.now()
        }));
    }, 1000);
}

// 飞书登录验证
if (!code) {
    window.location.href = `https://open.feishu.cn/open-apis/authen/v1/index?redirect_uri=${encodeURIComponent(REDIRECT_URI)}&client_id=${APP_ID}&response_type=code`;
} else {
    document.getElementById("userInfo").innerText = "✅ 飞书身份验证成功";
    document.getElementById("submitBtn").style.display = "block";
    startTimer();
}

// 提交
document.getElementById("submitBtn").onclick = function () {
    if (!isUnlock) {
        document.getElementById("msg").innerText = "❌ 请完成学习后再提交";
        return;
    }
    window.open(FORM_URL, "_blank");
    document.getElementById("msg").innerText = "✅ 提交成功！";
};

// 核心：自动点击关闭AI内容速览按钮
frame.onload = function () {
    // 尝试多次点击，确保生效
    const closeAISidebar = () => {
        try {
            const doc = frame.contentDocument || frame.contentWindow.document;
            // 适配飞书关闭侧边栏的按钮（×号或折叠按钮）
            const closeBtn = doc.querySelector('[aria-label="关闭侧边栏"], [aria-label="隐藏侧边栏"], .sidebar-close-btn, .collapse-btn');
            if (closeBtn) {
                closeBtn.click();
                console.log("已自动关闭AI内容速览侧边栏");
            }
        } catch (e) {
            // 跨域限制时静默失败
            console.log("跨域限制，无法直接操作iframe内元素");
        }
    };

    // 页面加载后立即尝试，再延迟1秒尝试一次（防止元素还没渲染出来）
    closeAISidebar();
    setTimeout(closeAISidebar, 1000);
};
</script>
</body>
</html>
