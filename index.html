<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>培训视频学习</title>
    <style>
        body{margin:20px;font-family:Microsoft Yahei}
        .container{max-width:1000px;margin:0 auto}
        .video{width:100%;aspect-ratio:16/9;background:#000}
        .status{margin:10px 0;color:#666}
        button{padding:10px 20px;background:#0066ff;color:#fff;border:none;border-radius:6px;cursor:pointer}
    </style>
</head>
<body>
<div class="container">
    <h2>培训视频学习</h2>
    <div id="userInfo" class="status">正在验证飞书身份...</div>
    <iframe class="video" src="https://saic-gm.feishu.cn/file/AC1dbFxXio5iAIxJwS0c5dssn0b" frameborder="0" allowfullscreen></iframe>
    <br><br>
    <button id="submitBtn" style="display:none">我已学习完毕（去提交记录）</button>
    <div id="msg" class="status"></div>
</div>

<script>
// ====================== 你的配置 ======================
const APP_ID = "cli_aa847d2bff64dbd3";
const FORM_URL = "https://saic-gm.feishu.cn/share/base/form/shrcnNO5xfLIjMtZsN0nEbQjKvb"; // 替换成你自己的表单链接
// =====================================================

const REDIRECT_URI = window.location.origin + window.location.pathname;
const params = new URLSearchParams(location.search);
const code = params.get("code");

let userName = "";
let userId = "";

// 1. 无 code 跳飞书授权
if (!code) {
    const redirectUrl = encodeURIComponent(REDIRECT_URI);
    window.location.href = `https://open.feishu.cn/open-apis/authen/v1/index?redirect_uri=${redirectUrl}&client_id=${APP_ID}&response_type=code`;
}

// 2. 获取用户信息（仅前端授权，不调用API）
(async () => {
    try {
        // 这里用飞书前端授权获取用户信息（不需要API请求）
        const urlParams = new URLSearchParams(window.location.search);
        const userInfoStr = urlParams.get("userInfo"); // 部分飞书授权会直接返回用户信息
        
        // 如果没有直接返回，这里可以用飞书JS-SDK获取，不过为了简单，我们先做跳转
        document.getElementById("userInfo").innerText = `✅ 身份已确认，请观看视频后提交`;
        document.getElementById("submitBtn").style.display = "block";
    } catch (e) {
        document.getElementById("userInfo").innerText = "❌ 身份验证失败：" + e.toString();
    }
})();

// 3. 点击按钮跳转到表单（自动填充用户信息）
document.getElementById("submitBtn").onclick = async function () {
    // 构造带参数的表单链接，飞书表单支持URL参数自动填充
    const redirectFormUrl = `${FORM_URL}?姓名=${encodeURIComponent(userName)}&用户ID=${encodeURIComponent(userId)}&完成时间=${encodeURIComponent(new Date().toLocaleString("zh-CN"))}`;
    window.location.href = redirectFormUrl;
};
</script>
</body>
</html>
