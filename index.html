<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>培训视频学习</title>
    <style>
        body{margin:20px;font-family:Microsoft Yahei}
        .container{max-width:1000px;margin:0 auto}
        .video{width:100%;aspect-ratio:16/9;background:#000}
        .status{margin:10px 0;color:#666}
        button{padding:10px 20px;background:#0066ff;color:#fff;border:none;border-radius:6px;cursor:pointer}
        button:disabled{background:#ccc;cursor:not-allowed}
        .progress{margin:10px 0;color:#0066ff;font-weight:bold}
        .tip{color:#ff6600;margin:10px 0}
        #startBtn{background:#00b42a;margin:10px 0}
    </style>
</head>
<body>
<div class="container">
    <h2>培训视频学习</h2>
    <div id="userInfo" class="status">正在验证飞书身份...</div>
    <iframe id="videoIframe" class="video" src="https://saic-gm.feishu.cn/file/AC1dbFxXio5iAIxJwS0c5dssn0b" frameborder="0" allowfullscreen></iframe>
    
    <div id="tipText" class="tip">⚠️ 点击下方「开始学习」按钮后，播放进度才会开始计算</div>
    <button id="startBtn">开始学习</button>
    
    <div id="progressText" class="progress">播放进度：0% / 需播放至80%解锁提交按钮</div>
    
    <br><br>
    <button id="submitBtn" style="display:none" disabled>已学习完毕，提交记录</button>
    <div id="msg" class="status"></div>
</div>

<script>
// 基础配置
const APP_ID = "cli_aa847d2bff64dbd3";
const FORM_URL = "https://saic-gm.feishu.cn/share/base/form/shrcnmgO6ZVJsGWTBzlmb2oTVmh";
const REDIRECT_URI = window.location.origin + window.location.pathname;
const params = new URLSearchParams(location.search);
const code = params.get("code");

// 视频时长配置（12分58秒 = 778秒）
const VIDEO_TOTAL_SECONDS = 778;
const WATCH_PERCENT = 10;
const TARGET_SECONDS = VIDEO_TOTAL_SECONDS * (WATCH_PERCENT / 100);
let currentSeconds = 0;
let isBtnUnlocked = false;
let timer = null;
let isStarted = false;

// 从本地存储恢复进度（刷新不重置）
function loadProgress() {
    const saved = localStorage.getItem('training_progress');
    if (saved) {
        const data = JSON.parse(saved);
        if (data.time && Date.now() - data.timestamp < 24*60*60*1000) { // 24小时内有效
            currentSeconds = data.time;
            const percent = (currentSeconds / VIDEO_TOTAL_SECONDS) * 100;
            document.getElementById("progressText").innerText = `播放进度：${Math.min(percent, 100).toFixed(1)}% / 需播放至${WATCH_PERCENT}%解锁提交按钮`;
            if (currentSeconds >= TARGET_SECONDS) {
                isBtnUnlocked = true;
                document.getElementById("submitBtn").disabled = false;
                document.getElementById("progressText").innerText = `✅ 播放进度：${WATCH_PERCENT}%，已解锁提交按钮！`;
                document.getElementById("progressText").style.color = "#00b42a";
            }
        }
    }
}

// 1. 无授权码：跳飞书登录
if (!code) {
    window.location.href = `https://open.feishu.cn/open-apis/authen/v1/index?redirect_uri=${encodeURIComponent(REDIRECT_URI)}&client_id=${APP_ID}&response_type=code`;
} else {
    // 2. 身份验证成功
    document.getElementById("userInfo").innerText = "✅ 飞书身份验证成功";
    const submitBtn = document.getElementById("submitBtn");
    submitBtn.style.display = "block";

    // 加载历史进度
    loadProgress();

    // 点击开始学习按钮触发计时
    document.getElementById("startBtn").addEventListener("click", function() {
        if (isStarted) return;
        isStarted = true;
        document.getElementById("tipText").style.display = "none";
        document.getElementById("startBtn").style.display = "none";
        startProgressSimulation();
    });
}

// 模拟播放进度
function startProgressSimulation() {
    const progressText = document.getElementById("progressText");
    const submitBtn = document.getElementById("submitBtn");

    // 每秒更新一次进度
    timer = setInterval(() => {
        currentSeconds++;
        const currentPercent = (currentSeconds / VIDEO_TOTAL_SECONDS) * 100;

        // 更新进度文本
        progressText.innerText = `播放进度：${Math.min(currentPercent, 100).toFixed(1)}% / 需播放至${WATCH_PERCENT}%解锁提交按钮`;

        // 保存进度到本地
        localStorage.setItem('training_progress', JSON.stringify({
            time: currentSeconds,
            timestamp: Date.now()
        }));

        // 达到目标进度，解锁按钮
        if (currentSeconds >= TARGET_SECONDS && !isBtnUnlocked) {
            isBtnUnlocked = true;
            submitBtn.disabled = false;
            progressText.innerText = `✅ 播放进度：${WATCH_PERCENT}%，已解锁提交按钮！`;
            progressText.style.color = "#00b42a";
            clearInterval(timer); // 停止计时
        }

        // 防止超过100%
        if (currentSeconds >= VIDEO_TOTAL_SECONDS) {
            clearInterval(timer);
        }
    }, 1000);
}

// 点击按钮跳转表单
document.getElementById("submitBtn").onclick = function(){
    if(!isBtnUnlocked) {
        document.getElementById("msg").innerText = "❌ 请先完成80%的视频学习再提交";
        return;
    }
    
    const now = new Date().toLocaleString("zh-CN");
    // 简化参数传递，避免URL过长问题
    const jumpUrl = `${FORM_URL}?授权码=${encodeURIComponent(code)}&完成时间=${encodeURIComponent(now)}`;
    try {
        window.open(jumpUrl,"_blank");
        document.getElementById("msg").innerText = "✅ 已跳转到提交表单，请完成提交";
    } catch (e) {
        document.getElementById("msg").innerText = "❌ 跳转失败，请检查表单链接是否正确";
    }
}
</script>
</body>
</html>
