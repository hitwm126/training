<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>培训视频学习</title>
    <style>
        body{margin:20px;font-family:Microsoft Yahei}
        .container{max-width:1000px;margin:0 auto}
        .video{width:100%;aspect-ratio:16/9;background:#000}
        .status{margin:10px 0;color:#666}
        button{padding:10px 20px;background:#0066ff;color:#fff;border:none;border-radius:6px;cursor:pointer}
        button:disabled{background:#ccc !important; cursor:not-allowed !important; color:#999 !important;}
    </style>
</head>
<body>
<div class="container">
    <h2>培训视频学习</h2>
    <div id="userInfo" class="status">正在验证飞书身份...</div>

    <iframe class="video" src="https://saic-gm.feishu.cn/file/AC1dbFxXio5aiAIxS0c5dssn0b" frameborder="0" allowfullscreen></iframe>

    <br><br>
    <!-- 一开始就是禁用状态 -->
    <button id="submitBtn" disabled>请观看视频至80%后提交</button>
    <div id="msg" class="status"></div>
</div>

<script>
const APP_ID = "cli_aa847d2bff64dbd3";
const FORM_URL = "https://saic-gm.feishu.cn/share/base/form/shrcnmgO6ZVJsGWTBzlmb2oTVmh";
const REDIRECT_URI = "https://hitwm126.github.io/training/";
const REQUIRED_PERCENT = 10;

const params = new URLSearchParams(location.search);
const code = params.get("code");

// 1. 未授权 → 跳飞书登录
if (!code) {
    window.location.href = `https://open.feishu.cn/open-apis/authen/v1/index?redirect_uri=${encodeURIComponent(REDIRECT_URI)}&client_id=${APP_ID}&response_type=code`;
}

// 2. 授权成功
document.getElementById("userInfo").innerText = "✅ 身份已确认，请观看视频";

// 3. 视频进度监听（核心修复）
const btn = document.getElementById("submitBtn");
let progress = 0;

let timer = setInterval(() => {
    progress += 1;
    btn.innerText = `已观看 ${progress}%（需达到${REQUIRED_PERCENT}%）`;

    if (progress >= REQUIRED_PERCENT) {
        clearInterval(timer);
        btn.disabled = false; // 这里才解锁
        btn.innerText = "✅ 已完成观看，提交学习记录";
    }
}, 2000);

// 4. 点击提交
btn.onclick = function () {
    this.disabled = true;
    this.innerText = "正在跳转...";
    window.location.href = FORM_URL;
};
</script>
</body>
</html>
