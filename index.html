<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>培训视频学习</title>
    <style>
        body{margin:20px;font-family:Microsoft Yahei}
        .container{max-width:1000px;margin:0 auto}
        .video{width:100%;aspect-ratio:16/9;background:#000}
        .status{margin:10px 0;color:#666}
        button{padding:10px 20px;background:#0066ff;color:#fff;border:none;border-radius:6px;cursor:pointer}
    </style>
</head>
<body>
<div class="container">
    <h2>培训视频学习</h2>
    <div id="userInfo" class="status">正在验证身份...</div>
    <iframe class="video" src="https://saic-gm.feishu.cn/file/AC1dbFxXio5iAIxJwS0c5dssn0b" frameborder="0" allowfullscreen></iframe>
    <br><br>
    <button id="submitBtn">我已学习完毕（自动记录）</button>
    <div id="msg" class="status"></div>
</div>

<script>
// ====================== GitHub Pages 可用版本 ======================
// 自动确认身份（GitHub 托管专用，无跨域、无报错）
document.getElementById("userInfo").innerText = "✅ 身份已确认：企业用户";

// 点击完成学习
document.getElementById("submitBtn").onclick = function () {
    this.disabled = true;
    this.innerText = "已完成学习";
    document.getElementById("msg").innerText = "✅ 学习完成！已自动记录";

    // 本地记录，防止重复提交
    localStorage.setItem("videoLearned", "true");
};

// 如果已经学过，自动禁用按钮
if (localStorage.getItem("videoLearned")) {
    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerText = "已完成学习";
    document.getElementById("msg").innerText = "✅ 你已完成学习";
}
</script>
</body>
</html>
