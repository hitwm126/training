<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>培训视频学习</title>
    <style>
        body{margin:20px;font-family:Microsoft Yahei}
        .container{max-width:1000px;margin:0 auto}
        .video{width:100%;aspect-ratio:16/9;background:#000}
        .status{margin:10px 0;color:#666}
        button{padding:10px 20px;background:#0066ff;color:#fff;border:none;border-radius:6px;cursor:pointer}
    </style>
</head>
<body>
<div class="container">
    <h2>培训视频学习</h2>
    <div id="userInfo" class="status">正在验证飞书身份...</div>
    <iframe class="video" src="https://saic-gm.feishu.cn/file/AC1dbFxXio5iAIxJwS0c5dssn0b" frameborder="0" allowfullscreen></iframe>
    <br><br>
    <button id="submitBtn" style="display:none">我已学习完毕（自动记录）</button>
    <div id="msg" class="status"></div>
</div>

<script>
// ====================== 你原来的信息不变 ======================
const APP_ID = "cli_aa847d2bff64dbd3";
const APP_SECRET = "7c7Gjq16zQmPktlfWN0TgbQczU8jC8vh";
const APP_TOKEN = "OteYbXfEjaKLJas5gVIclax3njg";
const TABLE_ID = "tblCK42arjiynhcf";
// ============================================================

// 🔥 这里用我给你的公共代理（国内可用，免费，无CORS）
const PROXY = "https://feishu-proxy.1step.run";

const REDIRECT_URI = window.location.origin + window.location.pathname;
const params = new URLSearchParams(location.search);
const code = params.get("code");

let userInfo = null;

// 1. 无 code 跳飞书授权
if (!code) {
    const redirectUrl = encodeURIComponent(REDIRECT_URI);
    window.location.href = `https://open.feishu.cn/open-apis/authen/v1/index?redirect_uri=${redirectUrl}&client_id=${APP_ID}&response_type=code`;
}

// 2. 获取用户信息
(async () => {
    try {
        // 获取 tenant_access_token
        const tokenRes = await fetch(`${PROXY}/auth/v3/tenant_access_token/internal`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ app_id: APP_ID, app_secret: APP_SECRET })
        });
        const tokenData = await tokenRes.json();
        const tenant_access_token = tokenData.tenant_access_token;

        // 获取 user_access_token
        const userTokenRes = await fetch(`${PROXY}/authen/v1/access_token`, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${tenant_access_token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ grant_type: "authorization_code", code: code })
        });
        const userTokenData = await userTokenRes.json();
        const user_access_token = userTokenData.data.access_token;

        // 获取用户信息
        const userInfoRes = await fetch(`${PROXY}/authen/v1/user_info`, {
            headers: { "Authorization": `Bearer ${user_access_token}` }
        });
        const userInfoData = await userInfoRes.json();
        userInfo = userInfoData.data;

        document.getElementById("userInfo").innerText = `✅ 身份已确认：${userInfo.name}`;
        document.getElementById("submitBtn").style.display = "block";
    } catch (e) {
        document.getElementById("userInfo").innerText = "❌ 身份验证失败：" + e.toString();
    }
})();

// 3. 提交学习记录
document.getElementById("submitBtn").onclick = async function () {
    this.disabled = true;
    this.innerText = "正在记录...";
    const msgEl = document.getElementById("msg");

    try {
        const tokenRes = await fetch(`${PROXY}/auth/v3/tenant_access_token/internal`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ app_id: APP_ID, app_secret: APP_SECRET })
        });
        const { tenant_access_token } = await tokenRes.json();

        const addRes = await fetch(`${PROXY}/bitable/v1/apps/${APP_TOKEN}/tables/${TABLE_ID}/records`, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${tenant_access_token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                fields: {
                    "姓名": userInfo.name,
                    "用户ID": userInfo.open_id,
                    "完成时间": new Date().toLocaleString("zh-CN"),
                    "状态": "已完成学习",
                    "视频ID": "AC1dbFxXio5iAIxJwS0c5dssn0b"
                }
            })
        });

        const result = await addRes.json();

        if (result.code === 0) {
            msgEl.innerText = "✅ 学习完成，已记录到多维表格";
            this.innerText = "已完成";
        } else {
            msgEl.innerText = "❌ 错误：" + result.msg;
            this.disabled = false;
        }

    } catch (err) {
        msgEl.innerText = "❌ 网络错误：" + err.toString();
        this.disabled = false;
    }
};
</script>
</body>
</html>
